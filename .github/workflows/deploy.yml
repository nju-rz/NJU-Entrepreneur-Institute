name: Deploy VitePress site
on:
  push:
    branches: [main]
  workflow_dispatch:

# 👇 新增：显式声明权限（核心修复）
permissions:
  contents: write  # 允许读写仓库内容（推送到gh-pages分支）
  pages: write     # 允许操作GitHub Pages
  id-token: write  # 可选，增强Pages部署权限

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.0
          cache: 'npm'

      - name: Install dependencies (fix network/permission)
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci --force
          if [ ! -d "node_modules/vitepress" ]; then
            echo "❌ vitepress 依赖未安装成功！"
            ls -la node_modules/
            exit 1
          fi

      - name: Build VitePress site (fix permission)
        run: |
          chmod +x node_modules/.bin/vitepress
          node_modules/.bin/vitepress build docs
          if [ ! -d "docs/.vitepress/dist" ]; then
            echo "❌ 构建产物未生成！"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vitepress/dist
          force_orphan: true
          publish_branch: gh-pages
          # 👇 新增：强制推送（覆盖旧分支，避免冲突）
          force_push: true