name: Deploy VitePress site
on:
  push:
    branches: [main]
  workflow_dispatch:

# 强制用 Node.js 24 运行 Actions（消除弃用警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 显式声明权限（解决403问题）
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24  # 适配Node.js 24，兼容VitePress
          cache: 'npm'

      - name: Install dependencies (fix network/permission)
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci --force
          if [ ! -d "node_modules/vitepress" ]; then
            echo "❌ vitepress 依赖未安装成功！"
            ls -la node_modules/
            exit 1
          fi

      - name: Build VitePress site (fix permission)
        run: |
          chmod +x node_modules/.bin/vitepress
          node_modules/.bin/vitepress build docs
          if [ ! -d "docs/.vitepress/dist" ]; then
            echo "❌ 构建产物未生成！"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # v4版本
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vitepress/dist
          force_orphan: true  # 保留这个参数即可实现强制覆盖
          publish_branch: gh-pages
          # 👇 删除无效的 force_push: true 参数